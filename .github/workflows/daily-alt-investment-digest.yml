name: Daily Alternative Investments Digest

on:
  schedule:
    - cron: '30 0 * * *'  # 08:30 Beijing time (UTC+8), daily
  workflow_dispatch:      # Allow manual trigger from GitHub UI

jobs:
  alt-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Fetch alt-investments headlines (Google News)
        run: node scripts/prepare-alt-digest.js > /tmp/alt-digest-data.json

      - name: Generate digest with Groq
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          cat /tmp/alt-digest-data.json | node scripts/remix-alt-digest-groq.js > /tmp/alt-digest.txt
          echo "Digest generated ($(wc -c < /tmp/alt-digest.txt) bytes)"

      - name: Send digest via Gmail SMTP
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: cat /tmp/alt-digest.txt | node scripts/deliver-alt-digest.js
