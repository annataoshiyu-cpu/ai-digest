name: AI Builders Daily Digest

on:
  schedule:
    - cron: '0 0 * * *'  # 08:00 Beijing time (UTC+8)
  workflow_dispatch:      # Allow manual trigger from GitHub UI

jobs:
  digest:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Clone follow-builders
        run: git clone https://github.com/zarazhangrui/follow-builders.git

      - name: Install dependencies
        run: cd follow-builders/scripts && npm install

      - name: Checkout this repo (for remix script)
        uses: actions/checkout@v4
        with:
          path: this-repo

      - name: Fetch raw content
        run: |
          cd follow-builders/scripts
          node prepare-digest.js > /tmp/raw-data.json
          node -e "const d=require('/tmp/raw-data.json'); console.log('Stats:', JSON.stringify(d.stats))"

      - name: Generate bilingual digest with Groq
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          cd follow-builders/scripts
          cat /tmp/raw-data.json | GROQ_API_KEY=$GROQ_API_KEY node ../../this-repo/scripts/remix-groq.js > /tmp/digest.txt
          echo "Digest generated ($(wc -c < /tmp/digest.txt) bytes)"

      - name: Install nodemailer
        run: cd follow-builders/scripts && npm install nodemailer

      - name: Send email via Gmail SMTP
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          cp this-repo/scripts/deliver-smtp.js follow-builders/scripts/deliver-smtp.js
          cd follow-builders/scripts
          cat /tmp/digest.txt | GMAIL_USER=$GMAIL_USER GMAIL_APP_PASSWORD=$GMAIL_APP_PASSWORD node deliver-smtp.js
